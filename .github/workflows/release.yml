name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install frontend dependencies
        run: npm install

      - name: Download pdfium.dll
        shell: pwsh
        run: |
          $pdfiumDir = "src-tauri/resources/pdfium"
          if (!(Test-Path "$pdfiumDir/pdfium.dll")) {
            New-Item -ItemType Directory -Force -Path $pdfiumDir | Out-Null
            $url = "https://github.com/nicehash/pdfium-binaries/releases/latest/download/pdfium-windows-x64.zip"
            Invoke-WebRequest -Uri $url -OutFile "pdfium.zip"
            Expand-Archive -Path "pdfium.zip" -DestinationPath "pdfium-temp" -Force
            Copy-Item "pdfium-temp/bin/pdfium.dll" "$pdfiumDir/pdfium.dll"
            Remove-Item -Recurse -Force "pdfium-temp", "pdfium.zip"
          }

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Comic-Bridge v__VERSION__"
          releaseBody: |
            Comic-Bridge v__VERSION__

            インストーラーをダウンロードして実行してください。
            既存のバージョンがインストールされている場合、アプリ内の自動アップデートで更新されます。
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true
